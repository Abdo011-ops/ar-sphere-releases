name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install dependencies
        run: npm install
        
      - name: Build APK
        run: npx eas build --platform android --profile production --non-interactive
        
      - name: Download APK
        run: |
          # سيتم إضافة رابط التحميل هنا
          echo "Build complete"
