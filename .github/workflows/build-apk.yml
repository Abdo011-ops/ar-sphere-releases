name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Check and fix package.json
      run: |
        if [ ! -f package.json ]; then
          echo "No package.json found. Creating one..."
          npx create-expo-app@latest temp-app --template blank
          cp -r temp-app/* .
          rm -rf temp-app
        fi
        
    - name: Ensure Android package is set
      run: |
        if [ ! -f app.json ]; then
          echo '{"expo": {"android": {"package": "com.example.myapp"}}}' > app.json
        else
          node -e "
          const fs = require('fs');
          let config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          if(!config.expo) config.expo = {};
          if(!config.expo.android) config.expo.android = {};
          if(!config.expo.android.package) config.expo.android.package = 'com.example.myapp';
          fs.writeFileSync('app.json', JSON.stringify(config, null, 2));
          "
        fi
        echo "Final app.json:"
        cat app.json
        
    - name: Install dependencies
      run: npm install
      
    - name: Install Expo CLI
      run: npm install -g expo-cli
      
    - name: Prebuild Android
      run: npx expo prebuild --platform android --no-install
      
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleRelease
      env:
        ORG_GRADLE_PROJECT_hermesEnabled: true
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/*.apk
